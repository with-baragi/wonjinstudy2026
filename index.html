<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘 꼭 해야 할 일 추천기</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="theme-switch-container">
        <label class="theme-switch" for="theme-toggle">
            <input type="checkbox" id="theme-toggle">
            <div class="slider round"></div>
        </label>
    </div>

    <div class="app-container">
        <header>
            <h1>오늘 꼭 해야 할 일 추천기</h1>
            <p class="subtitle">하기 싫지만 하면 무조건 좋은 일, 제가 골라드릴게요.</p>
        </header>

        <main id="main-content">
            <!-- Step 1: Start -->
            <div class="step active" id="step-1">
                <h2>오늘도 미루고 싶나요?</h2>
                <p>지금 당신의 상태에 딱 맞는 활동을 추천해 드립니다.</p>
                <button class="btn-primary" id="start-btn">추천 받기</button>
            </div>

            <!-- Step 2: Energy Level -->
            <div class="step" id="step-2">
                <h2>현재 기운이 얼마나 있나요?</h2>
                <p>0(방전) ~ 100(풀충전) 사이로 선택해주세요.</p>
                <div class="slider-container">
                    <input type="range" id="energy-level" class="range-slider" min="0" max="100" value="50">
                    <span id="energy-value">50</span>
                </div>
                <button class="btn-primary" id="next-btn-1">다음</button>
            </div>

            <!-- Step 3: Time of Day -->
            <div class="step" id="step-3">
                <h2>지금은 어떤 시간대인가요?</h2>
                <div class="select-group">
                    <button class="btn-outline time-btn" data-time="morning">☀️ 아침</button>
                    <button class="btn-outline time-btn" data-time="afternoon">🌤️ 오후</button>
                    <button class="btn-outline time-btn" data-time="evening">🌅 저녁</button>
                    <button class="btn-outline time-btn" data-time="night">🌙 밤</button>
                </div>
                <input type="hidden" id="time-of-day" value="">
                <button class="btn-primary" id="generate-btn">지금 바로 추천받기</button>
            </div>
            
            <!-- Step 4: Results -->
            <div class="step" id="step-5">
                <h2>오늘 당신의 미션!</h2>
                <div id="results-container"></div>
                <p class="motivation-msg" id="motivation-msg"></p>
                <button class="btn-primary" id="reset-btn">다시 추천 받기</button>
            </div>
        </main>
        
        <footer>
            <p>미루지 말고 지금 시작하세요! 🔥</p>
        </footer>
    </div>

    <script src="main.js"></script>
</body>
</html>
